<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeTom - Quản lý chi tiêu</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome để dùng icon ngôi sao, biểu đồ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- THANH ĐIỀU HƯỚNG (NAVBAR) -->
    <nav class="navbar">
        <div class="logo">MeTom</div>
        <ul class="nav-links">
            <li class="nav-item active" data-target="page-input"><i class="fa-solid fa-pen-to-square"></i> Nhập liệu</li>
            <li class="nav-item" data-target="page-stats"><i class="fa-solid fa-chart-line"></i> Thống kê</li>
            <li class="nav-item" data-target="page-favorites"><i class="fa-solid fa-star"></i> Yêu thích</li>
        </ul>
    </nav>

    <!-- KHU VỰC NỘI DUNG CÁC TRANG -->
    <main class="container">
        
        <!-- TRANG 1: NHẬP LIỆU -->
        <section id="page-input" class="page-content active">
            <h2>Nhật ký chi tiêu tháng này</h2>
            <!-- Khu vực nhập liệu của bạn nằm ở đây -->
            <div class="input-group">
                <input type="text" id="item-name" placeholder="Tên sản phẩm (Ví dụ: Nước giặt Omo)">
                <input type="number" id="item-price" placeholder="Số tiền (đ)">
                <select id="item-category">
                    <option value="thuc_pham">Thực phẩm</option>
                    <option value="hoa_my_pham">Hóa mỹ phẩm</option>
                    <option value="dien_nuoc">Điện nước, Internet</option>
                    <option value="y_te">Y tế & Sức khỏe</option>
                    <option value="khac">Chi phí khác</option>
                </select>
                <button id="btn-add-item">Thêm vào danh sách</button>
            </div>

            <h3>Danh sách chi tiết tháng này</h3>
            <table id="table-current-month">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Số tiền</th>
                        <th>Yêu thích</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dữ liệu tạm thời của tháng sẽ render ở đây -->
                </tbody>
            </table>

            <div class="checkout-zone">
                <button id="btn-checkout" class="btn-danger"><i class="fa-solid fa-box-archive"></i> Kết thúc & Chốt sổ tháng này</button>
            </div>
        </section>

        <!-- TRANG 2: THỐNG KÊ -->
        <section id="page-stats" class="page-content">
            <h2>Thống kê & Biến động chi tiêu</h2>
            <div class="filter-zone">
                <label for="select-month-history">Chọn tháng xem lịch sử:</label>
                <select id="select-month-history">
                    <option value="">-- Chọn tháng --</option>
                </select>
            </div>
            
            <div id="stats-display">
                <p>Vui lòng chọn một tháng để xem chi tiết hoặc so sánh biến động.</p>
            </div>
        </section>

        <!-- TRANG 3: YÊU THÍCH -->
        <section id="page-favorites" class="page-content">
            <h2>Sản phẩm tiêu dùng thông minh (Yêu thích)</h2>
            <div id="favorites-list" class="grid-container">
                <!-- Các thẻ sản phẩm yêu thích sẽ render ở đây -->
            </div>
        </section>

    </main>

    <!-- BẢN CƠ SỞ DỮ LIỆU/LOGIC SCRIPTS -->
    <script src="js/app.js"></script>
    <script src="js/input.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/favorites.js"></script>
</body>
</html>
